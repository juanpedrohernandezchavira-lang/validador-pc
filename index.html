<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Master Builder PC Pro</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="main-container">
        <h1>Master Builder PC</h1>
        
        <section class="builder-panel">
            <div class="form-group">
                <label>Tipo de Equipo:</label>
                <select id="deviceType" onchange="limpiarYFiltrar()">
                    <option value="">-- Selecciona el tipo --</option>
                    <option value="desktop">PC de Escritorio</option>
                    <option value="laptop">Laptop</option>
                </select>
            </div>

            <div class="form-group">
                <label>Marca de CPU:</label>
                <select id="cpuBrand" onchange="filtrarSockets()">
                    <option value="">-- Selecciona --</option>
                    <option value="AMD">AMD</option>
                    <option value="Intel">Intel</option>
                </select>
            </div>

            <div class="form-group">
                <label>Socket:</label>
                <select id="cpuSocket" onchange="filtrarComponentes()"></select>
            </div>

            <div class="form-group"><label>CPU:</label><select id="cpu" onchange="actualizarSimulacion()"></select></div>
            <div class="form-group"><label>Motherboard:</label><select id="motherboard" onchange="actualizarSimulacion()"></select></div>
            <div class="form-group"><label>RAM:</label><select id="ram" onchange="actualizarSimulacion()"></select></div>
            <div class="form-group"><label>GPU:</label><select id="gpu" onchange="actualizarSimulacion()"></select></div>
            <div class="form-group"><label>PSU:</label><select id="psu" onchange="actualizarSimulacion()"></select></div>
            <div class="form-group"><label>Almacenamiento:</label><select id="storage" onchange="actualizarSimulacion()"></select></div>
        </section>

        <section class="status-panel">
            <div id="totalPrice">Total: $0.00 MXN</div>
            <div id="statusReport">Selecciona componentes...</div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
